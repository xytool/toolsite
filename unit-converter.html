<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="免费在线单位换算器 - 长度/重量/温度/面积/体积/速度/数据/时间/压力/功率等全面换算，纯浏览器本地处理。">
  <meta name="keywords" content="单位换算器,长度换算,重量换算,温度换算,面积换算,体积换算,速度换算,数据换算">
  <title>单位换算器 - 在线工具箱</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .category-tabs { display:flex; gap:4px; flex-wrap:wrap; margin:16px 0; }
    .cat-tab {
      padding:8px 16px; border:1px solid var(--border); border-radius:8px;
      cursor:pointer; font-size:13px; font-weight:600; background:var(--card);
      transition:all .2s; white-space:nowrap;
    }
    .cat-tab:hover { border-color:var(--primary); }
    .cat-tab.active { background:var(--primary); color:#fff; border-color:var(--primary); }

    .converter-box {
      display:flex; gap:16px; align-items:center; margin:20px 0; flex-wrap:wrap;
      justify-content:center;
    }
    .conv-field {
      display:flex; flex-direction:column; gap:4px; min-width:200px; flex:1;
    }
    .conv-field label { font-size:12px; color:var(--text-muted); font-weight:600; }
    .conv-field input {
      padding:12px 16px; border:1px solid var(--border); border-radius:8px;
      font-size:18px; font-weight:600; outline:none; transition:border-color .2s;
      font-family:"Cascadia Code","Fira Code",Consolas,monospace;
    }
    .conv-field input:focus { border-color:var(--primary); }
    .conv-field select {
      padding:10px 14px; border:1px solid var(--border); border-radius:8px;
      font-size:14px;
    }
    .swap-icon {
      font-size:24px; color:var(--primary); cursor:pointer; padding:10px;
      transition:transform .3s;
    }
    .swap-icon:hover { transform:rotate(180deg); }

    .all-units {
      display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
      gap:8px; margin:16px 0;
    }
    .unit-row {
      display:flex; justify-content:space-between; align-items:center;
      padding:8px 14px; background:#f8fafc; border:1px solid var(--border);
      border-radius:6px; font-size:14px;
    }
    .unit-row .label { color:var(--text-muted); font-size:13px; }
    .unit-row .value { font-family:monospace; font-weight:600; color:var(--text); word-break:break-all; }

    .formula-box {
      padding:12px 16px; background:#eff6ff; border-radius:8px;
      font-size:14px; color:#1e40af; margin:12px 0; text-align:center;
    }
  </style>
</head>
<body>

<header class="navbar">
  <a href="index.html" class="logo"><span>🧰</span> 在线工具箱</a>
  <nav>
    <a href="base-converter.html">进制转换</a>
    <a href="unit-converter.html" class="active">单位换算</a>
    <a href="lorem-generator.html">Lorem</a>
    <a href="url-encoder.html">URL编码</a>
  </nav>
</header>

<main class="container">
  <div class="tool-header">
    <h1>🧮 单位换算器</h1>
    <p>长度/重量/温度/面积/体积/速度/数据/时间/压力/功率 全面换算，纯浏览器本地处理</p>
  </div>

  <div class="tutorial-box">
    <h3>📖 使用教程</h3>
    <ol>
      <li><strong>选择类别</strong> - 点击顶部标签选择长度、重量、温度等单位类别</li>
      <li><strong>输入数值</strong> - 在左侧输入框输入数值</li>
      <li><strong>选择单位</strong> - 分别选择输入和输出的单位</li>
      <li><strong>查看结果</strong> - 结果实时显示，下方显示全部单位对照表</li>
    </ol>
    <div class="tip"><strong>💡 提示：</strong>点击中间的 ⇄ 图标可快速交换输入输出单位。</div>
  </div>

  

  <div class="card">
    <!-- 类别选择 -->
    <div class="category-tabs" id="categoryTabs"></div>

    <!-- 换算器 -->
    <div class="converter-box">
      <div class="conv-field">
        <label id="fromLabel">从</label>
        <input type="number" id="fromValue" value="1" oninput="convert()" step="any">
        <select id="fromUnit" onchange="convert()"></select>
      </div>
      <div class="swap-icon" onclick="swapUnits()">⇄</div>
      <div class="conv-field">
        <label id="toLabel">到</label>
        <input type="number" id="toValue" readonly>
        <select id="toUnit" onchange="convert()"></select>
      </div>
    </div>

    <!-- 公式 -->
    <div class="formula-box" id="formulaBox"></div>

    <!-- 全部单位 -->
    <div style="margin-top:20px;">
      <label style="font-size:14px;font-weight:600;">📊 全部单位对照：</label>
      <div class="all-units" id="allUnits"></div>
    </div>
  </div>
</main>

<footer class="footer">
  <p>© 2026 在线工具箱 · 所有文件仅在浏览器本地处理，不会上传到服务器</p>
</footer>

<script>
const categories = {
  length: {
    name: '📏 长度', base: 'm',
    units: { km:1000, m:1, dm:0.1, cm:0.01, mm:0.001, um:0.000001, nm:0.000000001,
      mi:1609.344, yd:0.9144, ft:0.3048, in_:0.0254, li:500, nmi:1852 },
    labels: { km:'千米(km)', m:'米(m)', dm:'分米(dm)', cm:'厘米(cm)', mm:'毫米(mm)',
      um:'微米(μm)', nm:'纳米(nm)', mi:'英里(mi)', yd:'码(yd)', ft:'英尺(ft)',
      in_:'英寸(in)', li:'里', nmi:'海里(nmi)' }
  },
  weight: {
    name: '⚖️ 重量', base: 'kg',
    units: { t:1000, kg:1, g:0.001, mg:0.000001, ug:0.000000001,
      lb:0.45359237, oz:0.028349523, jin:0.5, liang:0.05, dan:50 },
    labels: { t:'吨(t)', kg:'千克(kg)', g:'克(g)', mg:'毫克(mg)', ug:'微克(μg)',
      lb:'磅(lb)', oz:'盎司(oz)', jin:'斤', liang:'两', dan:'担' }
  },
  temperature: {
    name: '🌡️ 温度', base: 'special',
    units: { c:1, f:1, k:1 },
    labels: { c:'摄氏度(°C)', f:'华氏度(°F)', k:'开尔文(K)' }
  },
  area: {
    name: '📐 面积', base: 'm2',
    units: { km2:1e6, ha:1e4, m2:1, dm2:0.01, cm2:0.0001, mm2:0.000001,
      mu:666.667, acre:4046.856, ft2:0.0929, in2:0.000645 },
    labels: { km2:'平方千米(km²)', ha:'公顷(ha)', m2:'平方米(m²)', dm2:'平方分米(dm²)',
      cm2:'平方厘米(cm²)', mm2:'平方毫米(mm²)', mu:'亩', acre:'英亩(ac)', ft2:'平方英尺(ft²)', in2:'平方英寸(in²)' }
  },
  volume: {
    name: '🧊 体积', base: 'L',
    units: { m3:1000, L:1, mL:0.001, gal:3.78541, qt:0.946353, pt:0.473176,
      cup:0.236588, floz:0.0295735, tbsp:0.0147868, tsp:0.00492892 },
    labels: { m3:'立方米(m³)', L:'升(L)', mL:'毫升(mL)', gal:'加仑(gal)',
      qt:'夸脱(qt)', pt:'品脱(pt)', cup:'杯(cup)', floz:'液量盎司(fl oz)',
      tbsp:'汤匙(tbsp)', tsp:'茶匙(tsp)' }
  },
  speed: {
    name: '🚀 速度', base: 'ms',
    units: { ms:1, kmh:0.277778, mph:0.44704, kn:0.514444, mach:340.29, c:299792458 },
    labels: { ms:'米/秒(m/s)', kmh:'千米/时(km/h)', mph:'英里/时(mph)',
      kn:'节(kn)', mach:'马赫(Ma)', c:'光速(c)' }
  },
  data: {
    name: '💾 数据', base: 'B',
    units: { bit:0.125, B:1, KB:1024, MB:1048576, GB:1073741824, TB:1099511627776,
      PB:1125899906842624, Kbit:128, Mbit:131072, Gbit:134217728 },
    labels: { bit:'比特(bit)', B:'字节(B)', KB:'千字节(KB)', MB:'兆字节(MB)',
      GB:'吉字节(GB)', TB:'太字节(TB)', PB:'拍字节(PB)', Kbit:'千比特(Kbit)', Mbit:'兆比特(Mbit)', Gbit:'吉比特(Gbit)' }
  },
  time: {
    name: '⏱️ 时间', base: 's',
    units: { y:31536000, mo:2592000, w:604800, d:86400, h:3600, min:60, s:1, ms:0.001, us:0.000001 },
    labels: { y:'年(y)', mo:'月(30天)', w:'周(w)', d:'天(d)', h:'时(h)', min:'分(min)', s:'秒(s)', ms:'毫秒(ms)', us:'微秒(μs)' }
  },
  pressure: {
    name: '💨 压力', base: 'Pa',
    units: { Pa:1, kPa:1000, MPa:1000000, bar:100000, atm:101325, psi:6894.76, mmHg:133.322 },
    labels: { Pa:'帕斯卡(Pa)', kPa:'千帕(kPa)', MPa:'兆帕(MPa)', bar:'巴(bar)',
      atm:'标准大气压(atm)', psi:'磅/平方英寸(psi)', mmHg:'毫米汞柱(mmHg)' }
  },
  power: {
    name: '⚡ 功率', base: 'W',
    units: { W:1, kW:1000, MW:1000000, hp:745.7, ps:735.499, BTUh:0.29307107 },
    labels: { W:'瓦特(W)', kW:'千瓦(kW)', MW:'兆瓦(MW)', hp:'英制马力(hp)',
      ps:'公制马力(PS)', BTUh:'BTU/时' }
  }
};

let currentCat = 'length';

// 初始化类别标签
const tabsEl = document.getElementById('categoryTabs');
Object.keys(categories).forEach(key => {
  const cat = categories[key];
  const div = document.createElement('div');
  div.className = 'cat-tab' + (key === 'length' ? ' active' : '');
  div.textContent = cat.name;
  div.onclick = (e) => selectCategory(key, e.target);
  tabsEl.appendChild(div);
});

function selectCategory(key, clickedEl) {
  currentCat = key;
  document.querySelectorAll('.cat-tab').forEach(el => el.classList.remove('active'));
  if (clickedEl) clickedEl.classList.add('active');
  else document.querySelector('.cat-tab').classList.add('active');

  const cat = categories[key];
  const fromSelect = document.getElementById('fromUnit');
  const toSelect = document.getElementById('toUnit');
  const unitKeys = Object.keys(cat.units);

  fromSelect.innerHTML = unitKeys.map(k => `<option value="${k}">${cat.labels[k]}</option>`).join('');
  toSelect.innerHTML = unitKeys.map(k => `<option value="${k}">${cat.labels[k]}</option>`).join('');

  // 默认选第2个
  if (unitKeys.length > 1) toSelect.value = unitKeys[1];

  document.getElementById('fromValue').value = 1;
  convert();
}

function convert() {
  const cat = categories[currentCat];
  const fromVal = parseFloat(document.getElementById('fromValue').value) || 0;
  const fromU = document.getElementById('fromUnit').value;
  const toU = document.getElementById('toUnit').value;

  let result;

  if (currentCat === 'temperature') {
    result = convertTemp(fromVal, fromU, toU);
  } else {
    const baseVal = fromVal * cat.units[fromU];
    result = baseVal / cat.units[toU];
  }

  // 智能格式化
  const formatted = Math.abs(result) < 0.001 || Math.abs(result) > 1e9
    ? result.toExponential(6) : parseFloat(result.toPrecision(10));

  document.getElementById('toValue').value = formatted;

  // 公式
  document.getElementById('formulaBox').textContent =
    `${fromVal} ${cat.labels[fromU]} = ${formatted} ${cat.labels[toU]}`;

  // 全部单位
  const allEl = document.getElementById('allUnits');
  let html = '';
  Object.keys(cat.units).forEach(k => {
    let val;
    if (currentCat === 'temperature') {
      val = convertTemp(fromVal, fromU, k);
    } else {
      val = (fromVal * cat.units[fromU]) / cat.units[k];
    }
    const fmt = Math.abs(val) < 0.001 || Math.abs(val) > 1e9
      ? val.toExponential(4) : parseFloat(val.toPrecision(8));
    html += `<div class="unit-row"><span class="label">${cat.labels[k]}</span><span class="value">${fmt}</span></div>`;
  });
  allEl.innerHTML = html;
}

function convertTemp(val, from, to) {
  // 先转摄氏度
  let c;
  switch (from) {
    case 'c': c = val; break;
    case 'f': c = (val - 32) * 5 / 9; break;
    case 'k': c = val - 273.15; break;
  }
  // 从摄氏度转目标
  switch (to) {
    case 'c': return c;
    case 'f': return c * 9 / 5 + 32;
    case 'k': return c + 273.15;
  }
}

function swapUnits() {
  const from = document.getElementById('fromUnit');
  const to = document.getElementById('toUnit');
  const fv = document.getElementById('fromValue');
  const tv = document.getElementById('toValue');

  [from.value, to.value] = [to.value, from.value];
  fv.value = tv.value;
  convert();
}

// 初始化
selectCategory('length');
</script>

</body>
</html>
