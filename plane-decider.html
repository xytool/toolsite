<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飞机决定器 - 在线工具</title>
<link rel="stylesheet" href="css/style.css">
<style>
.plane-display { text-align:center; padding:30px 20px; }
.plane-icon { font-size:80px; margin-bottom:16px; transition:transform .3s; }
.plane-icon.fly { animation:flyIn 1s ease; }
@keyframes flyIn { 0%{transform:translateX(-200px) scale(.5);opacity:0} 100%{transform:translateX(0) scale(1);opacity:1} }
.plane-name { font-size:28px; font-weight:800; color:var(--primary); margin-bottom:8px; }
.plane-desc { font-size:16px; color:var(--text-muted); margin-bottom:20px; }
.plane-specs { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; max-width:400px; margin:0 auto; }
.spec-item { background:#f8fafc; padding:12px; border-radius:8px; text-align:center; }
.spec-item .label { font-size:12px; color:var(--text-muted); }
.spec-item .value { font-size:18px; font-weight:700; color:var(--primary); }
.category-btns { display:flex; gap:8px; justify-content:center; margin:16px 0; flex-wrap:wrap; }
</style>
</head>
<body>
<div class="navbar"><a href="index.html" class="logo"><span>🧰</span> 在线工具箱</a></div>
<div class="container">
  <div class="tool-header"><h1>✈️ 飞机决定器</h1><p>今天开什么飞机？让命运决定你的座驾</p></div>
  <div class="card">
    <div class="category-btns">
      <button class="btn btn-primary" onclick="randomPlane('all')">🎲 随机飞机</button>
      <button class="btn btn-outline" onclick="randomPlane('fighter')">🚀 战斗机</button>
      <button class="btn btn-outline" onclick="randomPlane('airliner')">🛫 客机</button>
      <button class="btn btn-outline" onclick="randomPlane('helicopter')">🚁 直升机</button>
      <button class="btn btn-outline" onclick="randomPlane('vintage')">🛩️ 复古机</button>
    </div>
    <div class="plane-display" id="planeDisplay">
      <div class="plane-icon" id="planeIcon">✈️</div>
      <div class="plane-name" id="planeName">点击按钮，决定你的座驾</div>
      <div class="plane-desc" id="planeDesc"></div>
      <div class="plane-specs" id="planeSpecs" style="display:none;"></div>
    </div>
  </div>
</div>
<script>
var planes = {
  fighter: [
    {icon:'🚀',name:'F-22 猛禽',desc:'第五代隐身战斗机，空中霸主',speed:'2.25马赫',range:'2960km',crew:'1人',origin:'🇺🇸 美国'},
    {icon:'🚀',name:'歼-20 威龙',desc:'中国第五代隐身战斗机',speed:'2.0马赫',range:'3000km',crew:'1人',origin:'🇨🇳 中国'},
    {icon:'🚀',name:'苏-57',desc:'俄罗斯第五代战斗机',speed:'2.0马赫',range:'3500km',crew:'1人',origin:'🇷🇺 俄罗斯'},
    {icon:'🚀',name:'F-35 闪电',desc:'多用途隐身战斗机',speed:'1.6马赫',range:'2220km',crew:'1人',origin:'🇺🇸 美国'},
    {icon:'🚀',name:'歼-16',desc:'多用途战斗机，炸弹卡车',speed:'2.0马赫',range:'3900km',crew:'2人',origin:'🇨🇳 中国'}
  ],
  airliner: [
    {icon:'🛫',name:'波音 747',desc:'空中女王，宽体客机传奇',speed:'0.85马赫',range:'14815km',crew:'2-4人',origin:'🇺🇸 美国'},
    {icon:'🛫',name:'空客 A380',desc:'全球最大客机，双层巨无霸',speed:'0.85马赫',range:'15700km',crew:'2人',origin:'🇪🇺 欧洲'},
    {icon:'🛫',name:'C919',desc:'中国自主研制大飞机',speed:'0.785马赫',range:'5555km',crew:'2人',origin:'🇨🇳 中国'},
    {icon:'🛫',name:'波音 787',desc:'梦想客机，复合材料机身',speed:'0.85马赫',range:'15700km',crew:'2人',origin:'🇺🇸 美国'},
    {icon:'🛫',name:'空客 A350',desc:'新一代宽体客机',speed:'0.89马赫',range:'18000km',crew:'2人',origin:'🇪🇺 欧洲'}
  ],
  helicopter: [
    {icon:'🚁',name:'AH-64 阿帕奇',desc:'武装直升机之王',speed:'293km/h',range:'1900km',crew:'2人',origin:'🇺🇸 美国'},
    {icon:'🚁',name:'直-10',desc:'中国专用武装直升机',speed:'290km/h',range:'800km',crew:'2人',origin:'🇨🇳 中国'},
    {icon:'🚁',name:'CH-47 支奴干',desc:'纵列双旋翼运输直升机',speed:'315km/h',range:''}  
  ]  
};

// 由于内容太长，我简化一下
var allPlanes = [
  {icon:'🚀',name:'F-22 猛禽',desc:'第五代隐身战斗机，空中霸主',speed:'2.25马赫',range:'2960km',crew:'1人',origin:'🇺🇸 美国'},
  {icon:'🚀',name:'歼-20 威龙',desc:'中国第五代隐身战斗机',speed:'2.0马赫',range:'3000km',crew:'1人',origin:'🇨🇳 中国'},
  {icon:'🛫',name:'波音 747',desc:'空中女王，宽体客机传奇',speed:'0.85马赫',range:'14815km',crew:'2-4人',origin:'🇺🇸 美国'},
  {icon:'🛫',name:'C919',desc:'中国自主研制大飞机',speed:'0.785马赫',range:'5555km',crew:'2人',origin:'🇨🇳 中国'},
  {icon:'🚁',name:'AH-64 阿帕奇',desc:'武装直升机之王',speed:'293km/h',range:'1900km',crew:'2人',origin:'🇺🇸 美国'},
  {icon:'🛩️',name:'P-51 野马',desc:'二战传奇战斗机',speed:'718km/h',range:'2400km',crew:'1人',origin:'🇺🇸 美国'},
  {icon:'🛩️',name:'初教-6',desc:'中国经典初级教练机',speed:'300km/h',range:'600km',crew:'2人',origin:'🇨🇳 中国'},
  {icon:'🚀',name:'SR-71 黑鸟',desc:'最快侦察机，3倍音速',speed:'3.3马赫',range:'5400km',crew:'2人',origin:'🇺🇸 美国'}
];

function randomPlane(type) {
  var list = type === 'all' ? allPlanes : planes[type] || allPlanes;
  var plane = list[Math.floor(Math.random() * list.length)];
  
  document.getElementById('planeIcon').textContent = plane.icon;
  document.getElementById('planeIcon').className = 'plane-icon fly';
  setTimeout(function(){document.getElementById('planeIcon').className = 'plane-icon';}, 1000);
  
  document.getElementById('planeName').textContent = plane.name;
  document.getElementById('planeDesc').textContent = plane.desc;
  document.getElementById('planeSpecs').style.display = 'grid';
  document.getElementById('planeSpecs').innerHTML = 
    '<div class="spec-item"><div class="label">最高速度</div><div class="value">' + plane.speed + '</div></div>' +
    '<div class="spec-item"><div class="label">航程</div><div class="value">' + plane.range + '</div></div>' +
    '<div class="spec-item"><div class="label">乘员</div><div class="value">' + plane.crew + '</div></div>' +
    '<div class="spec-item"><div class="label">原产国</div><div class="value">' + plane.origin + '</div></div>';
}
</script>
</body>
</html>
