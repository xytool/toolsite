      <li><strong>閫夋嫨鏂瑰悜</strong> - 鐐瑰嚮銆岀紪鐮併€嶆垨銆岃В鐮併€嶆寜閽?/li>

<script>
let encType = 'url';
let direction = 'encode';

function setEncType(type) {
  encType = type;
  document.querySelectorAll('.enc-tab').forEach(el => el.classList.remove('active'));
  event.target.classList.add('active');
  updateInfoBox();
  convert();
}

function setDir(dir) {
  direction = dir;
  document.querySelectorAll('.dir-btn').forEach(el => el.classList.remove('active'));
  event.target.classList.add('active');
  updateInfoBox();
  convert();
}

function updateInfoBox() {
  const typeNames = {
    url: 'URL 缂栫爜 (encodeURI)',
    urlcomponent: 'URL Component 缂栫爜 (encodeURIComponent)',
    html: 'HTML 瀹炰綋缂栫爜',
    unicode: 'Unicode 杞箟 (\\uXXXX)',
    base64: 'Base64 缂栫爜'
  };
  const dirNames = { encode: '缂栫爜', decode: '瑙ｇ爜' };
  const descs = {
    url: '淇濈暀URL缁撴瀯瀛楃(:/?=&绛?锛岀紪鐮佺┖鏍间负%20锛岄€傚悎缂栫爜瀹屾暣URL',
    urlcomponent: '缂栫爜鎵€鏈夌壒娈婂瓧绗︼紝绌烘牸鍙樹负%20锛岄€傚悎缂栫爜URL鍙傛暟鍊?,
    html: '灏?<銆?銆?銆乗"銆乗' 杞崲涓?HTML 瀹炰綋锛岄槻姝SS娉ㄥ叆',
    unicode: '灏嗛潪ASCII瀛楃杞崲涓?\\uXXXX 鏍煎紡锛屽父鐢ㄤ簬JSON/JS',
    base64: '灏嗘枃鏈紪鐮佷负Base64鏍煎紡锛屽父鐢ㄤ簬鏁版嵁浼犺緭'
  };
  document.getElementById('infoBox').textContent =
    `褰撳墠妯″紡锛?{typeNames[encType]} ${dirNames[direction]} 鈥?${descs[encType]}`;
}

function convert() {
  const input = document.getElementById('inputText').value;
  const output = document.getElementById('outputText');
  const info = document.getElementById('resultInfo');

  if (!input) { output.value = ''; info.textContent = ''; return; }

  try {
    let result;
    const isEncode = direction === 'encode';

    switch (encType) {
      case 'url':
        result = isEncode ? encodeURI(input) : decodeURI(input);
        break;
      case 'urlcomponent':
        result = isEncode ? encodeURIComponent(input) : decodeURIComponent(input);
        break;
      case 'html':
        result = isEncode ? htmlEncode(input) : htmlDecode(input);
        break;
      case 'unicode':
        result = isEncode ? unicodeEncode(input) : unicodeDecode(input);
        break;
      case 'base64':
        result = isEncode ? btoa(unescape(encodeURIComponent(input))) : decodeURIComponent(escape(atob(input)));
        break;
    }

    output.value = result;
    const diff = result.length - input.length;
    info.textContent = `${result.length} 瀛楃 (${diff >= 0 ? '+' : ''}${diff})`;
  } catch (e) {
    output.value = '鉂?' + e.message;
    info.textContent = '閿欒';
  }
}

function htmlEncode(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function htmlDecode(s) {
  const el = document.createElement('div');
  el.innerHTML = s;
  return el.textContent;
}

function unicodeEncode(s) {
  return Array.from(s).map(ch => {
    const code = ch.codePointAt(0);
    return code > 127 ? `\\u${code.toString(16).padStart(4, '0')}` : ch;
  }).join('');
}

function unicodeDecode(s) {
  return s.replace(/\\u([0-9a-fA-F]{4,6})/g, (_, hex) => String.fromCodePoint(parseInt(hex, 16)));
}

function loadSample(type) {
  const samples = {
    url: 'https://example.com/search?q=hello world&lang=涓枃&page=1',
    chinese: '浣犲ソ涓栫晫锛佽繖鏄腑鏂囨祴璇?馃帀',
    emoji: '馃榾馃帀馃敟馃挴馃専馃寛馃殌馃捇馃幆鉁?,
    html: '<scr' + 'ipt>alert("XSS")</scr' + 'ipt><b>绮椾綋</b>&"寮曞彿"',
    special: 'a@b#c$d%e^f&g*h(i)j=+[]{}|;:,.<>?/'
  };
  document.getElementById('inputText').value = samples[type];
  convert();
}

function copyResult() {
  navigator.clipboard.writeText(document.getElementById('outputText').value).then(() => {
    const btn = event.target;
    const orig = btn.textContent;
    btn.textContent = '鉁?宸插鍒?;
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

function swapPane() {
  const input = document.getElementById('inputText');
  const output = document.getElementById('outputText');
  input.value = output.value;
  // Toggle direction
  direction = direction === 'encode' ? 'decode' : 'encode';
  document.querySelectorAll('.dir-btn').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.dir-btn')[direction === 'encode' ? 0 : 1].classList.add('active');
  updateInfoBox();
  convert();
}

function clearAll() {
  document.getElementById('inputText').value = '';
  document.getElementById('outputText').value = '';
  document.getElementById('resultInfo').textContent = '';
}
</script>
