<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="免费在线URL编码解码工具 - 支持URL编码、解码、完整编码、批量处理，实时预览。">
  <title>URL 编码解码 - 在线工具箱</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    .editor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 640px) { .editor-grid { grid-template-columns: 1fr; } }
    textarea { width: 100%; min-height: 250px; padding: 14px; border: 1px solid var(--border); border-radius: 8px; font-family: 'Cascadia Code','Fira Code',Consolas,monospace; font-size: 13px; line-height: 1.6; resize: vertical; outline: none; transition: border-color .2s; box-sizing: border-box; }
    textarea:focus { border-color: var(--primary); }
    .action-bar { display: flex; gap: 8px; flex-wrap: wrap; margin: 16px 0; align-items: center; }
    .info-box { background: #f8fafc; border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; font-size: 13px; margin: 8px 0; display: flex; gap: 16px; flex-wrap: wrap; }
    .info-item { display: flex; gap: 6px; align-items: center; }
    .info-item .key { color: var(--text-muted); }
    .info-item .val { font-weight: 700; color: var(--primary); font-family: monospace; }
  </style>
</head>
<body>
<header class="navbar">
  <a href="index.html" class="logo"><span>🛠️</span> 在线工具箱</a>
  <nav>
    <a href="image-compressor.html">图片压缩</a>
    <a href="qr-generator.html">二维码</a>
    <a href="json-formatter.html">JSON工具</a>
    <a href="password-generator.html">密码生成</a>
    <a href="timestamp-converter.html">时间戳</a>
    <a href="base64-tool.html">Base64</a>
  </nav>
</header>

<main class="container">
  <div class="tool-header">
    <h1>🔗 URL 编码解码工具</h1>
    <p>对URL或字符串进行编码/解码，支持完整编码和批量处理。</p>
  </div>
  
  <div class="tutorial-box">
    <h3>📖 使用教程</h3>
    <ol>
      <li><strong>输入内容</strong> - 输入URL或包含特殊字符的文本</li>
      <li><strong>选择操作</strong> - URL编码、URL解码或完整编码</li>
      <li><strong>复制结果</strong> - 一键复制到剪贴板</li>
    </ol>
    <div class="tip"><strong>💡 提示：</strong>URL编码会将特殊字符转为%XX格式，用于URL传参。</div>
  </div>
  
  <div class="action-bar">
    <button class="btn btn-primary" onclick="urlEncode()">➡️ URL 编码</button>
    <button class="btn btn-outline" onclick="urlDecode()">⬅️ URL 解码</button>
    <button class="btn btn-outline" onclick="encodeAll()">➡️ 编码全部字符</button>
    <button class="btn btn-outline" onclick="swap()">🔄 交换</button>
    <button class="btn btn-outline" onclick="clearAll()">🗑️ 清空</button>
  </div>
  
  <div class="editor-grid">
    <div>
      <div style="font-weight:600;font-size:14px;margin-bottom:6px;">📥 输入</div>
      <textarea id="input" placeholder="输入URL或文本..." spellcheck="false"></textarea>
    </div>
    <div>
      <div style="font-weight:600;font-size:14px;margin-bottom:6px;">📤 输出</div>
      <textarea id="output" placeholder="结果..." spellcheck="false"></textarea>
    </div>
  </div>
  
  <div class="info-box">
    <div class="info-item"><span class="key">输入字符:</span><span class="val" id="inCount">0</span></div>
    <div class="info-item"><span class="key">输出字符:</span><span class="val" id="outCount">0</span></div>
  </div>
</main>

<footer class="footer">
  <p>© 2026 在线工具箱 · 所有文件仅在浏览器本地处理，不会上传到服务器。</p>
</footer>

<script>
const input = document.getElementById('input');
const output = document.getElementById('output');

input.oninput = () => {
  document.getElementById('inCount').textContent = input.value.length;
};
output.oninput = () => {
  document.getElementById('outCount').textContent = output.value.length;
};

function urlEncode() {
  if (!input.value) return alert('请输入内容');
  try {
    output.value = encodeURIComponent(input.value);
    document.getElementById('outCount').textContent = output.value.length;
  } catch(e) { alert('编码失败：' + e.message); }
}

function urlDecode() {
  if (!input.value) return alert('请输入编码内容');
  try {
    output.value = decodeURIComponent(input.value);
    document.getElementById('outCount').textContent = output.value.length;
  } catch(e) { alert('解码失败：' + e.message); }
}

function encodeAll() {
  if (!input.value) return alert('请输入内容');
  let result = '';
  for (const c of input.value) {
    result += '%' + c.charCodeAt(0).toString(16).padStart(2, '0');
  }
  output.value = result;
  document.getElementById('outCount').textContent = output.value.length;
}

function swap() {
  const tmp = input.value;
  input.value = output.value;
  output.value = tmp;
  document.getElementById('inCount').textContent = input.value.length;
  document.getElementById('outCount').textContent = output.value.length;
}

function clearAll() {
  input.value = '';
  output.value = '';
  document.getElementById('inCount').textContent = '0';
  document.getElementById('outCount').textContent = '0';
}
</script>
</body>
</html>
