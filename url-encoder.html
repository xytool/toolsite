<head>
  <meta charset="UTF-8">

  <meta name="keywords" content="URL,URL,urlencode,urldecode,HTML,">
  <title>URL  - ?/title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .dual-pane { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    @media(max-width:768px) { .dual-pane { grid-template-columns:1fr; } }
    .pane { display:flex; flex-direction:column; }
    .pane label { font-size:14px; font-weight:600; margin-bottom:6px; }
    .pane textarea {
      flex:1; min-height:260px; padding:14px; border:1px solid var(--border); border-radius:8px;
      font-family:"Cascadia Code","Fira Code",Consolas,monospace; font-size:14px; line-height:1.6;
      resize:vertical; outline:none; transition:border-color .2s; word-break:break-all;
    }
    .pane textarea:focus { border-color:var(--primary); }
    .pane textarea:read-only { background:#f8fafc; }

    .encode-tabs { display:flex; gap:4px; flex-wrap:wrap; margin:16px 0; }
    .enc-tab {
      padding:8px 16px; border:1px solid var(--border); border-radius:8px;
      cursor:pointer; font-size:13px; font-weight:600; background:var(--card);
      transition:all .2s;
    }
    .enc-tab:hover { border-color:var(--primary); }
    .enc-tab.active { background:var(--primary); color:#fff; border-color:var(--primary); }

    .direction-row { display:flex; gap:8px; justify-content:center; margin:12px 0; }
    .dir-btn {
      padding:8px 20px; border:1px solid var(--border); border-radius:8px;
      cursor:pointer; font-size:14px; font-weight:600; background:var(--card);
      transition:all .2s;
    }
    .dir-btn:hover { border-color:var(--primary); }
    .dir-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); }

    .info-box {
      padding:12px 16px; background:#eff6ff; border-radius:8px;
      font-size:13px; color:#1e40af; margin:12px 0;
    }

    .quick-samples { display:flex; gap:6px; flex-wrap:wrap; margin:12px 0; }
    .sample-btn {
      padding:4px 12px; font-size:12px; border:1px solid var(--border);
      border-radius:4px; cursor:pointer; background:var(--card); transition:all .15s;
    }
    .sample-btn:hover { border-color:var(--primary); background:#eef2ff; }
  </style>
</head>
<body>

<header class="navbar">
  <a href="index.html" class="logo"><span></span> ?/a>
  <nav>
    <a href="image-watermark.html"></a>
    <a href="text-dedup.html"></a>
    <a href="base-converter.html">H</a>
    <a href="url-encoder.html" class="active">URL</a>
  </nav>
</header>

<main class="container">
  <div class="tool-header">
    <h1> URL </h1>
    <p>URL/HTMLUnicodeN</p>
  </div>

  <div class="tutorial-box">
    <h3> </h3>
    <ol>
      <li><strong></strong> - URL/URL Component/HTML/Unicode/Base64</li>
      <li><strong></strong> - ?/li>
      <li><strong></strong> - ?/li>
      <li><strong></strong> - </li>
    </ol>
    <div class="tip"><strong> ?/strong>URLURL Component?/div>
  </div>

  

  <div class="card">
    <!--  -->
    <div class="encode-tabs">
      <div class="enc-tab active" onclick="setEncType('url')">URL </div>
      <div class="enc-tab" onclick="setEncType('urlcomponent')">URL Component</div>
      <div class="enc-tab" onclick="setEncType('html')">HTML </div>
      <div class="enc-tab" onclick="setEncType('unicode')">Unicode </div>
      <div class="enc-tab" onclick="setEncType('base64')">Base64</div>
    </div>

    <!--  -->
    <div class="direction-row">
      <div class="dir-btn active" onclick="setDir('encode')">  ?/div>
      <div class="dir-btn" onclick="setDir('decode')"> ?</div>
    </div>

    <!--  -->
    <div class="dual-pane">
      <div class="pane">
        <label> ?/label>
        <textarea id="inputText" placeholder="??.." oninput="convert()"></textarea>
      </div>
      <div class="pane">
        <label> ?span id="resultInfo" style="font-size:12px;color:var(--text-muted);font-weight:400;"></span></label>
        <textarea id="outputText" readonly placeholder="?.."></textarea>
      </div>
    </div>

    <div class="info-box" id="infoBox">
      URL  (encodeURIComponent) ? %XX URL?    </div>

    <!--  -->
    <div>
      <label style="font-size:13px;color:var(--text-muted);">?/label>
      <div class="quick-samples">
        <div class="sample-btn" onclick="loadSample('url')">URL</div>
        <div class="sample-btn" onclick="loadSample('chinese')"></div>
        <div class="sample-btn" onclick="loadSample('emoji')">Emoji</div>
        <div class="sample-btn" onclick="loadSample('html')">HTML</div>
        <div class="sample-btn" onclick="loadSample('special')"></div>
      </div>
    </div>

    <!--  -->
    <div style="display:flex;gap:12px;justify-content:center;margin-top:20px;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="convert()"> H</button>
      <button class="btn btn-outline" onclick="copyResult()"> </button>
      <button class="btn btn-outline" onclick="swapPane()"> </button>
      <button class="btn btn-outline" onclick="clearAll()">?</button>
    </div>
  </div>
</main>

<footer class="footer">
  <p> 2026 ? N?/p>
</footer>

<script>
let encType = 'url';
let direction = 'encode';

function setEncType(type) {
  encType = type;
  document.querySelectorAll('.enc-tab').forEach(el => el.classList.remove('active'));
  event.target.classList.add('active');
  updateInfoBox();
  convert();
}

function setDir(dir) {
  direction = dir;
  document.querySelectorAll('.dir-btn').forEach(el => el.classList.remove('active'));
  event.target.classList.add('active');
  updateInfoBox();
  convert();
}

function updateInfoBox() {
  const typeNames = {
    url: 'URL  (encodeURI)',
    urlcomponent: 'URL Component  (encodeURIComponent)',
    html: 'HTML ',
    unicode: 'Unicode  (\\uXXXX)',
    base64: 'Base64 '
  };
  const dirNames = { encode: '', decode: '' };
  const descs = {
    url: 'URL(:/?=&?%20URL',
    urlcomponent: '%20URL?,
    html: '?<??\"\' H?HTML SS',
    unicode: 'ASCIIH?\\uXXXX JSON/JS',
    base64: 'aBase64'
  };
  document.getElementById('infoBox').textContent =
    `?{typeNames[encType]} ${dirNames[direction]} ?${descs[encType]}`;
}

function convert() {
  const input = document.getElementById('inputText').value;
  const output = document.getElementById('outputText');
  const info = document.getElementById('resultInfo');

  if (!input) { output.value = ''; info.textContent = ''; return; }

  try {
    let result;
    const isEncode = direction === 'encode';

    switch (encType) {
      case 'url':
        result = isEncode ? encodeURI(input) : decodeURI(input);
        break;
      case 'urlcomponent':
        result = isEncode ? encodeURIComponent(input) : decodeURIComponent(input);
        break;
      case 'html':
        result = isEncode ? htmlEncode(input) : htmlDecode(input);
        break;
      case 'unicode':
        result = isEncode ? unicodeEncode(input) : unicodeDecode(input);
        break;
      case 'base64':
        result = isEncode ? btoa(unescape(encodeURIComponent(input))) : decodeURIComponent(escape(atob(input)));
        break;
    }

    output.value = result;
    const diff = result.length - input.length;
    info.textContent = `${result.length}  (${diff >= 0 ? '+' : ''}${diff})`;
  } catch (e) {
    output.value = '?' + e.message;
    info.textContent = '';
  }
}

function htmlEncode(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function htmlDecode(s) {
  const el = document.createElement('div');
  el.innerHTML = s;
  return el.textContent;
}

function unicodeEncode(s) {
  return Array.from(s).map(ch => {
    const code = ch.codePointAt(0);
    return code > 127 ? `\\u${code.toString(16).padStart(4, '0')}` : ch;
  }).join('');
}

function unicodeDecode(s) {
  return s.replace(/\\u([0-9a-fA-F]{4,6})/g, (_, hex) => String.fromCodePoint(parseInt(hex, 16)));
}

function loadSample(type) {
  const samples = {
    url: 'https://example.com/search?q=hello world&lang=&page=1',
    chinese: '|k?',
    emoji: '?,
    html: '<scr' + 'ipt>alert("XSS")</scr' + 'ipt><b></b>&""',
    special: 'a@b#c$d%e^f&g*h(i)j=+[]{}|;:,.<>?/'
  };
  document.getElementById('inputText').value = samples[type];
  convert();
}

function copyResult() {
  navigator.clipboard.writeText(document.getElementById('outputText').value).then(() => {
    const btn = event.target;
    const orig = btn.textContent;
    btn.textContent = '??;
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

function swapPane() {
  const input = document.getElementById('inputText');
  const output = document.getElementById('outputText');
  input.value = output.value;
  // Toggle direction
  direction = direction === 'encode' ? 'decode' : 'encode';
  document.querySelectorAll('.dir-btn').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.dir-btn')[direction === 'encode' ? 0 : 1].classList.add('active');
  updateInfoBox();
  convert();
}

function clearAll() {
  document.getElementById('inputText').value = '';
  document.getElementById('outputText').value = '';
  document.getElementById('resultInfo').textContent = '';
}
</script>

</body>
