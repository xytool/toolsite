<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星座运势 - 在线工具</title>
<link rel="stylesheet" href="css/style.css">
<style>
.zodiac-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(100px,1fr)); gap:12px; margin:20px 0; }
.zodiac-item { text-align:center; padding:16px 8px; border:1px solid var(--border); border-radius:12px; cursor:pointer; transition:all .2s; }
.zodiac-item:hover, .zodiac-item.active { border-color:var(--primary); background:#eef2ff; transform:translateY(-2px); }
.zodiac-item .icon { font-size:32px; margin-bottom:4px; }
.zodiac-item .name { font-size:13px; font-weight:600; }
.zodiac-item .date { font-size:11px; color:var(--text-muted); }
.fortune-result { display:none; }
.fortune-card { background:linear-gradient(135deg,#667eea,#764ba2); color:#fff; border-radius:16px; padding:24px; margin:20px 0; }
.fortune-header { text-align:center; margin-bottom:20px; }
.fortune-header .icon { font-size:48px; }
.fortune-header h2 { margin:8px 0; }
.fortune-items { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
.fortune-item { background:rgba(255,255,255,.15); padding:12px; border-radius:10px; text-align:center; }
.fortune-item .label { font-size:12px; opacity:.8; }
.fortune-item .stars { font-size:20px; margin:4px 0; }
.fortune-item .score { font-size:14px; font-weight:600; }
.fortune-text { background:#fff; border-radius:12px; padding:20px; margin-top:16px; color:var(--text); }
.fortune-text h4 { color:var(--primary); margin-bottom:8px; }
.fortune-text p { font-size:14px; line-height:1.8; color:var(--text-muted); }
.lucky-box { display:flex; gap:16px; justify-content:center; margin-top:16px; flex-wrap:wrap; }
.lucky-tag { background:#fef3c7; color:#92400e; padding:8px 16px; border-radius:20px; font-size:13px; font-weight:600; }
</style>
</head>
<body>
<div class="navbar"><a href="index.html" class="logo"><span>🧰</span> 在线工具箱</a></div>
<div class="container">
  <div class="tool-header"><h1>♈ 星座运势</h1><p>选择你的星座，查看今日运势</p></div>
  
  <div class="card">
    <div class="zodiac-grid" id="zodiacGrid"></div>
    
    <div class="fortune-result" id="fortuneResult">
      <div class="fortune-card">
        <div class="fortune-header">
          <div class="icon" id="zIcon">♈</div>
          <h2 id="zName">白羊座</h2>
          <p id="zDate">3.21 - 4.19</p>
        </div>
        <div class="fortune-items">
          <div class="fortune-item"><div class="label">综合运势</div><div class="stars" id="fTotal"></div><div class="score" id="sTotal"></div></div>
          <div class="fortune-item"><div class="label">爱情运势</div><div class="stars" id="fLove"></div><div class="score" id="sLove"></div></div>
          <div class="fortune-item"><div class="label">事业运势</div><div class="stars" id="fCareer"></div><div class="score" id="sCareer"></div></div>
          <div class="fortune-item"><div class="label">财富运势</div><div class="stars" id="fMoney"></div><div class="score" id="sMoney"></div></div>
        </div>
      </div>
      
      <div class="fortune-text">
        <h4>🔮 今日概述</h4>
        <p id="overview"></p>
        <h4 style="margin-top:16px;">💡 建议</h4>
        <p id="advice"></p>
      </div>
      
      <div class="lucky-box">
        <div class="lucky-tag">🎯 幸运数字：<span id="luckyNum"></span></div>
        <div class="lucky-tag">🎨 幸运颜色：<span id="luckyColor"></span></div>
        <div class="lucky-tag">🔢 速配星座：<span id="matchZodiac"></span></div>
      </div>
    </div>
  </div>
</div>
<script>
const zodiacs = [
  {icon:'♈',name:'白羊座',date:'3.21 - 4.19'},{icon:'♉',name:'金牛座',date:'4.20 - 5.20'},
  {icon:'♊',name:'双子座',date:'5.21 - 6.21'},{icon:'♋',name:'巨蟹座',date:'6.22 - 7.22'},
  {icon:'♌',name:'狮子座',date:'7.23 - 8.22'},{icon:'♍',name:'处女座',date:'8.23 - 9.22'},
  {icon:'♎',name:'天秤座',date:'9.23 - 10.23'},{icon:'♏',name:'天蝎座',date:'10.24 - 11.22'},
  {icon:'♐',name:'射手座',date:'11.23 - 12.21'},{icon:'♑',name:'摩羯座',date:'12.22 - 1.19'},
  {icon:'♒',name:'水瓶座',date:'1.20 - 2.18'},{icon:'♓',name:'双鱼座',date:'2.19 - 3.20'}
];
const overviews = ['今天精力充沛，适合开展新计划。保持积极心态，好运自然来。','可能会遇到小挑战，但只要冷静应对，都能顺利解决。','人际关系运势不错，多与朋友交流会有意外收获。','财运平稳，适合理财规划，避免冲动消费。','工作上可能有新机会，抓住时机展现自己。','感情运势升温，单身者有机会遇到心仪对象。','健康运势良好，适合运动健身，保持活力。','学习效率高涨，适合充电提升自己。'];
const advices = ['保持乐观心态，相信自己的能力。','遇到困难不要急躁，冷静思考再行动。','多倾听他人意见，会有意想不到的启发。','适当放松，不要给自己太大压力。','把握机会，勇敢尝试新事物。','与人相处多包容，和谐最重要。'];
const colors = ['红色','蓝色','绿色','黄色','紫色','粉色','橙色','白色','黑色','金色'];
function renderZodiac() {
  document.getElementById('zodiacGrid').innerHTML = zodiacs.map((z,i) => 
    '<div class="zodiac-item" onclick="showFortune(' + i + ')"><div class="icon">' + z.icon + '</div><div class="name">' + z.name + '</div><div class="date">' + z.date + '</div></div>'
  ).join('');
}
function showFortune(idx) {
  document.querySelectorAll('.zodiac-item').forEach((el,i) => el.classList.toggle('active', i === idx));
  const z = zodiacs[idx];
  const seed = idx + new Date().getDate();
  const rand = (n) => Math.floor(((seed * 9301 + 49297) % 233280) / 233280 * n);
  
  document.getElementById('zIcon').textContent = z.icon;
  document.getElementById('zName').textContent = z.name;
  document.getElementById('zDate').textContent = z.date;
  
  const scores = [rand(3)+3, rand(3)+3, rand(3)+3, rand(3)+3];
  ['Total','Love','Career','Money'].forEach((k,i) => {
    document.getElementById('f'+k).textContent = '⭐'.repeat(scores[i]) + '☆'.repeat(5-scores[i]);
    document.getElementById('s'+k).textContent = scores[i] + '/5';
  });
  
  document.getElementById('overview').textContent = overviews[rand(overviews.length)];
  document.getElementById('advice').textContent = advices[rand(advices.length)];
  document.getElementById('luckyNum').textContent = rand(99) + 1;
  document.getElementById('luckyColor').textContent = colors[rand(colors.length)];
  document.getElementById('matchZodiac').textContent = zodiacs[rand(12)].name;
  
  document.getElementById('fortuneResult').style.display = 'block';
  document.getElementById('fortuneResult').scrollIntoView({behavior:'smooth'});
}
renderZodiac();
</script>
</body>
</html>
