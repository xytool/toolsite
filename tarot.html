<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>塔罗牌占卜 - 在线工具</title>
<link rel="stylesheet" href="css/style.css">
<style>
.tarot-table { display:flex; gap:20px; justify-content:center; margin:30px 0; flex-wrap:wrap; }
.tarot-card { width:120px; height:200px; border-radius:12px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .3s; position:relative; }
.tarot-card.back { background:linear-gradient(135deg,#1e293b,#334155); border:2px solid #475569; }
.tarot-card.back::after { content:"🌙"; font-size:40px; }
.tarot-card.front { background:#fff; border:2px solid var(--primary); flex-direction:column; padding:12px; }
.tarot-card.front .suit { font-size:32px; margin-bottom:8px; }
.tarot-card.front .name { font-size:13px; font-weight:600; text-align:center; }
.tarot-card.front .desc { font-size:11px; color:var(--text-muted); text-align:center; margin-top:4px; }
.tarot-pos { text-align:center; font-size:12px; color:var(--text-muted); margin-bottom:8px; }
.spread-select { display:flex; gap:12px; justify-content:center; margin:20px 0; }
</style>
</head>
<body>
<div class="navbar"><a href="index.html" class="logo"><span>🧰</span> 在线工具箱</a></div>
<div class="container">
  <div class="tool-header"><h1>🔮 塔罗牌占卜</h1><p>抽取三张牌，解读过去、现在、未来</p></div>
  <div class="card">
    <div class="spread-select">
      <button class="btn btn-primary" onclick="drawCards()">🎴 抽取塔罗牌</button>
      <button class="btn btn-outline" onclick="resetCards()">重置</button>
    </div>
    <div class="tarot-table" id="tarotTable">
      <div>
        <div class="tarot-pos">过去</div>
        <div class="tarot-card back" id="card1" onclick="reveal(1)"></div>
      </div>
      <div>
        <div class="tarot-pos">现在</div>
        <div class="tarot-card back" id="card2" onclick="reveal(2)"></div>
      </div>
      <div>
        <div class="tarot-pos">未来</div>
        <div class="tarot-card back" id="card3" onclick="reveal(3)"></div>
      </div>
    </div>
    <div id="interpretation" style="display:none;">
      <h3 style="text-align:center;margin-bottom:16px;">📖 牌意解读</h3>
      <div id="interpText" style="line-height:1.8;color:var(--text-muted);"></div>
    </div>
  </div>
</div>
<script>
var cards = [
  {suit:'⚔️',name:'宝剑王牌',desc:'新的想法，清晰的思维，突破'},
  {suit:'💰',name:'星币三',desc:'团队合作，技能提升， craftsmanship'},
  {suit:'🏠',name:'圣杯二',desc:'伙伴关系，和谐，相互吸引'},
  {suit:'🔥',name:'权杖骑士',desc:'冒险，热情，冲动行动'},
  {suit:'⚔️',name:'宝剑十',desc:'结束，痛苦，新的开始'},
  {suit:'💰',name:'星币十',desc:'财富，家庭，传承'},
  {suit:'🏠',name:'圣杯九',desc:'愿望实现，满足，幸福'},
  {suit:'🔥',name:'权杖六',desc:'胜利，认可，好消息'},
  {suit:'⚔️',name:'宝剑皇后',desc:'独立，清晰，理性'},
  {suit:'💰',name:'星币皇后',desc:'滋养，实用，财务稳定'},
  {suit:'🏠',name:'圣杯国王',desc:'情感成熟，慈悲，控制'},
  {suit:'🔥',name:'权杖国王',desc:'领导力，远见，创业'},
  {suit:'🌟',name:'愚人',desc:'新的开始，冒险，信任'},
  {suit:'🌟',name:'魔术师',desc:'创造力，意志力，显化'},
  {suit:'🌟',name:'女祭司',desc:'直觉，潜意识，神秘'},
  {suit:'🌟',name:'皇后',desc:'丰饶，母性，自然'},
  {suit:'🌟',name:'皇帝',desc:'权威，结构，控制'},
  {suit:'🌟',name:'教皇',desc:'传统，信仰，指导'},
  {suit:'🌟',name:'恋人',desc:'爱情，选择，和谐'},
  {suit:'🌟',name:'战车',desc:'意志力，胜利，决心'},
  {suit:'🌟',name:'力量',desc:'勇气，耐心，内在力量'},
  {suit:'🌟',name:'隐士',desc:'内省，孤独，寻求真理'}
];
var drawn = [];
var revealed = [false,false,false];
function drawCards() {
  drawn = []; revealed = [false,false,false];
  var deck = cards.slice().sort(function(){return Math.random()-.5;});
  drawn = deck.slice(0,3);
  for(var i=1;i<=3;i++) {
    var c=document.getElementById('card'+i);
    c.className='tarot-card back';
    c.innerHTML='';
    c.style.pointerEvents='auto';
  }
  document.getElementById('interpretation').style.display='none';
}
function reveal(n) {
  if(revealed[n-1] || drawn.length===0) return;
  revealed[n-1]=true;
  var c=document.getElementById('card'+n);
  var card=drawn[n-1];
  c.className='tarot-card front';
  c.innerHTML='<div class="suit">'+card.suit+'</div><div class="name">'+card.name+'</div><div class="desc">'+card.desc+'</div>';
  c.style.pointerEvents='none';
  if(revealed.every(function(v){return v;})) showInterp();
}
function showInterp() {
  var texts=['过去：'+drawn[0].name+'表示'+drawn[0].desc+'。这是你过去的能量，影响了现在的处境。','现在：'+drawn[1].name+'代表'+drawn[1].desc+'。这是你当前需要面对和处理的能量。','未来：'+drawn[2].name+'预示'+drawn[2].desc+'。这是即将到来的能量和可能的发展方向。'];
  document.getElementById('interpText').innerHTML=texts.map(function(t){return '<p>'+t+'</p>';}).join('');
  document.getElementById('interpretation').style.display='block';
}
function resetCards() { drawCards(); }
</script>
</body>
</html>
