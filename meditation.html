<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>冥想引导 - 在线工具</title>
<link rel="stylesheet" href="css/style.css">
<style>
.breathe-circle { width:200px; height:200px; margin:30px auto; border-radius:50%; background:linear-gradient(135deg,#667eea,#764ba2); display:flex; align-items:center; justify-content:center; color:#fff; font-size:18px; font-weight:600; transition:transform 4s ease-in-out; }
.breathe-circle.inhale { transform:scale(1.5); }
.breathe-circle.exhale { transform:scale(1); }
.timer-display { font-size:72px; font-weight:800; text-align:center; color:var(--primary); margin:20px 0; }
.mode-select { display:flex; gap:12px; justify-content:center; margin:20px 0; flex-wrap:wrap; }
.mode-btn { padding:12px 24px; border:2px solid var(--border); border-radius:12px; background:#fff; cursor:pointer; font-size:14px; transition:all .2s; }
.mode-btn:hover, .mode-btn.active { border-color:var(--primary); background:#eef2ff; color:var(--primary); }
.guide-text { text-align:center; font-size:18px; color:var(--text-muted); margin:20px 0; min-height:30px; }
</style>
</head>
<body>
<div class="navbar"><a href="index.html" class="logo"><span>🧰</span> 在线工具箱</a></div>
<div class="container">
  <div class="tool-header"><h1>🧘 冥想引导</h1><p>跟随呼吸节奏，放松身心，缓解压力</p></div>
  <div class="card">
    <div class="mode-select">
      <button class="mode-btn active" onclick="setMode(4,4,4,4)">🌿 平衡呼吸 (4-4-4-4)</button>
      <button class="mode-btn" onclick="setMode(4,7,8,0)">😌 放松呼吸 (4-7-8)</button>
      <button class="mode-btn" onclick="setMode(5,0,5,0)">⚡  box呼吸 (5-5)</button>
    </div>
    <div class="guide-text" id="guideText">点击开始，跟随圆圈呼吸</div>
    <div class="breathe-circle" id="breatheCircle">准备</div>
    <div class="timer-display" id="timer">00:00</div>
    <div style="text-align:center;">
      <button class="btn btn-primary" id="startBtn" onclick="startMeditation()">▶️ 开始冥想</button>
      <button class="btn btn-outline" onclick="stopMeditation()">⏹️ 停止</button>
    </div>
  </div>
</div>
<script>
var timerInterval, breatheInterval;
var seconds = 0;
var inhaleTime=4, holdTime=4, exhaleTime=4, hold2Time=4;
function setMode(i,h,e,h2) {
  inhaleTime=i; holdTime=h; exhaleTime=e; hold2Time=h2;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
}
function startMeditation() {
  stopMeditation();
  seconds=0;
  document.getElementById('startBtn').disabled=true;
  timerInterval=setInterval(function(){seconds++;document.getElementById('timer').textContent=formatTime(seconds);},1000);
  breatheCycle();
  breatheInterval=setInterval(breatheCycle,(inhaleTime+holdTime+exhaleTime+hold2Time)*1000);
}
function breatheCycle() {
  var circle=document.getElementById('breatheCircle');
  var guide=document.getElementById('guideText');
  circle.textContent='吸气'; circle.className='breathe-circle inhale'; guide.textContent='慢慢吸气...';
  setTimeout(function(){circle.textContent='屏息'; guide.textContent='保持呼吸...';},inhaleTime*1000);
  setTimeout(function(){circle.textContent='呼气'; circle.className='breathe-circle exhale'; guide.textContent='缓缓呼气...';},(inhaleTime+holdTime)*1000);
  setTimeout(function(){circle.textContent='屏息'; guide.textContent='放松...';},(inhaleTime+holdTime+exhaleTime)*1000);
}
function stopMeditation() {
  clearInterval(timerInterval); clearInterval(breatheInterval);
  document.getElementById('startBtn').disabled=false;
  document.getElementById('breatheCircle').className='breathe-circle';
  document.getElementById('breatheCircle').textContent='准备';
  document.getElementById('guideText').textContent='点击开始，跟随圆圈呼吸';
}
function formatTime(s) {var m=Math.floor(s/60);return String(m).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
</script>
</body>
</html>
