<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>姓名测试 - 在线工具</title>
<link rel="stylesheet" href="css/style.css">
<style>
.name-input { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
.name-input input { flex:1; min-width:150px; padding:12px 16px; border:1px solid var(--border); border-radius:8px; font-size:16px; }
.score-ring { width:160px; height:160px; margin:20px auto; position:relative; }
.score-ring svg { transform:rotate(-90deg); }
.score-ring .score-text { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; }
.score-ring .score-num { font-size:48px; font-weight:800; color:var(--primary); }
.result-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:12px; margin:20px 0; }
.result-item { background:#f8fafc; padding:16px; border-radius:10px; }
.result-item .label { font-size:12px; color:var(--text-muted); margin-bottom:4px; }
.result-item .value { font-size:18px; font-weight:700; color:var(--primary); }
.analysis-box { background:linear-gradient(135deg,#f0fdf4,#ecfdf5); border:1px solid #86efac; border-radius:12px; padding:20px; margin-top:16px; }
</style>
</head>
<body>
<div class="navbar"><a href="index.html" class="logo"><span>🧰</span> 在线工具箱</a></div>
<div class="container">
  <div class="tool-header"><h1>✨ 姓名测试</h1><p>输入姓名，测试运势得分</p></div>
  <div class="card">
    <div class="name-input">
      <input type="text" id="surname" placeholder="姓（如：张）" maxlength="2">
      <input type="text" id="givenname" placeholder="名（如：三）" maxlength="2">
      <button class="btn btn-primary" onclick="testName()">🔮 开始测试</button>
    </div>
    <div id="resultBox" style="display:none;">
      <div class="score-ring">
        <svg width="160" height="160" viewBox="0 0 160 160">
          <circle cx="80" cy="80" r="70" fill="none" stroke="#e2e8f0" stroke-width="12"/>
          <circle id="scoreCircle" cx="80" cy="80" r="70" fill="none" stroke="#4f46e5" stroke-width="12" stroke-linecap="round" stroke-dasharray="440" stroke-dashoffset="440" style="transition:stroke-dashoffset 1s ease;"/>
        </svg>
        <div class="score-text"><div class="score-num" id="scoreNum">0</div><div style="font-size:14px;color:#64748b;">综合得分</div></div>
      </div>
      <div class="result-grid">
        <div class="result-item"><div class="label">天格</div><div class="value" id="tianGe"></div></div>
        <div class="result-item"><div class="label">人格</div><div class="value" id="renGe"></div></div>
        <div class="result-item"><div class="label">地格</div><div class="value" id="diGe"></div></div>
        <div class="result-item"><div class="label">总格</div><div class="value" id="zongGe"></div></div>
        <div class="result-item"><div class="label">外格</div><div class="value" id="waiGe"></div></div>
        <div class="result-item"><div class="label">五行</div><div class="value" id="wuxing"></div></div>
      </div>
      <div class="analysis-box">
        <h4 style="color:#15803d;margin-bottom:12px;">📜 姓名解析</h4>
        <p id="analysis" style="font-size:14px;line-height:1.8;color:#166534;"></p>
      </div>
    </div>
  </div>
</div>
<script>
const wxing = ['金','木','水','火','土'];
const analysisText = ['此名大吉，前途光明，事业有成。','名字五行平衡，一生顺遂，平安喜乐。','姓名数理吉祥，贵人相助，财运亨通。','此名寓意美好，聪明伶俐，学业有成。','名字格局开阔，志向远大，必成大器。'];
function testName() {
  var s = document.getElementById('surname').value.trim();
  var g = document.getElementById('givenname').value.trim();
  if(!s || !g) { alert('请输入姓和名'); return; }
  var t = s.length * 5 + 1;
  var r = s.length * 5 + g.charCodeAt(0) % 10 + 1;
  var d = g.length * 5 + 1;
  var z = t + d - 1;
  var w = z - r + 1;
  var score = Math.min(100, Math.max(60, z + 20));
  document.getElementById('scoreNum').textContent = score;
  document.getElementById('scoreCircle').style.strokeDashoffset = 440 - (440 * score / 100);
  document.getElementById('tianGe').textContent = t + ' (' + (t > 10 ? '吉' : '平') + ')';
  document.getElementById('renGe').textContent = r + ' (' + (r > 10 ? '吉' : '平') + ')';
  document.getElementById('diGe').textContent = d + ' (' + (d > 5 ? '吉' : '平') + ')';
  document.getElementById('zongGe').textContent = z + ' (' + (z > 15 ? '大吉' : '吉') + ')';
  document.getElementById('waiGe').textContent = w + ' (' + (w > 5 ? '吉' : '平') + ')';
  document.getElementById('wuxing').textContent = wxing[score % 5];
  document.getElementById('analysis').textContent = analysisText[score % 5];
  document.getElementById('resultBox').style.display = 'block';
}
</script>
</body>
</html>
