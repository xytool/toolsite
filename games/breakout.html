<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>打砖块 - 小游戏乐园</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      background: linear-gradient(to bottom, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      color: #fff;
    }
    .back { align-self: flex-start; color: #fff; text-decoration: none; margin-bottom: 10px; }
    h1 { margin-bottom: 10px; }
    .score { font-size: 1.2em; margin-bottom: 15px; color: #4ecca3; }
    #gameCanvas { border: 2px solid #4ecca3; border-radius: 8px; }
    .controls { margin-top: 15px; }
    .btn {
      padding: 10px 30px;
      background: #4ecca3;
      color: #1a1a2e;
      border: none;
      border-radius: 25px;
      font-size: 1em;
      cursor: pointer;
      font-weight: bold;
    }
    .game-over {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .game-over.show { display: flex; }
    .game-over h2 { font-size: 2em; margin-bottom: 15px; color: #ff6b6b; }
    .game-over p { margin-bottom: 20px; font-size: 1.1em; }
  </style>
</head>
<body>
  <a href="../index.html" class="back">← 返回首页</a>
  <h1>🧱 打砖块</h1>
  <div class="score">得分: <span id="score">0</span> | 生命: <span id="lives">3</span></div>
  <canvas id="gameCanvas" width="480" height="400"></canvas>
  <div class="controls">
    <button class="btn" onclick="startGame()" id="startBtn">开始游戏</button>
  </div>
  <p style="margin-top: 10px; color: #888;">左右键或触摸移动挡板</p>
  
  <div class="game-over" id="gameOver">
    <h2 id="msg">游戏结束</h2>
    <p>最终得分: <span id="finalScore">0</span></p>
    <button class="btn" onclick="startGame()">再来一局</button>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let paddle = { x: 200, width: 80, height: 12, speed: 6 };
    let ball = { x: 240, y: 350, dx: 3, dy: -3, radius: 6 };
    let bricks = [];
    let score = 0;
    let lives = 3;
    let gameRunning = false;
    let animationId;
    let rightPressed = false;
    let leftPressed = false;
    
    const brickColors = ['#ff6b6b', '#f9ca24', '#6c5ce7', '#00b894', '#0984e3', '#e17055'];
    
    function createBricks() {
      bricks = [];
      const rows = 5;
      const cols = 8;
      const brickWidth = 50;
      const brickHeight = 20;
      const padding = 8;
      const offsetX = (canvas.width - (cols * (brickWidth + padding) - padding)) / 2;
      const offsetY = 40;
      
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          bricks.push({
            x: offsetX + c * (brickWidth + padding),
            y: offsetY + r * (brickHeight + padding),
            width: brickWidth,
            height: brickHeight,
            color: brickColors[r % brickColors.length],
            visible: true
          });
        }
      }
    }
    
    function drawBall() {
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
      ctx.fill();
    }
    
    function drawPaddle() {
      ctx.fillStyle = '#4ecca3';
      ctx.fillRect(paddle.x, canvas.height - paddle.height - 5, paddle.width, paddle.height);
    }
    
    function drawBricks() {
      bricks.forEach(brick => {
        if (brick.visible) {
          ctx.fillStyle = brick.color;
          ctx.fillRect(brick.x, brick.y, brick.width, brick.height);
          ctx.strokeStyle = 'rgba(0,0,0,0.2)';
          ctx.strokeRect(brick.x, brick.y, brick.width, brick.height);
        }
      });
    }
    
    function update() {
      if (!gameRunning) return;
      
      // Move paddle
      if (rightPressed && paddle.x < canvas.width - paddle.width) paddle.x += paddle.speed;
      if (leftPressed && paddle.x > 0) paddle.x -= paddle.speed;
      
      // Move ball
      ball.x += ball.dx;
      ball.y += ball.dy;
      
      // Wall collision
      if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) ball.dx = -ball.dx;
      if (ball.y - ball.radius < 0) ball.dy = -ball.dy;
      
      // Paddle collision
      if (ball.y + ball.radius > canvas.height - paddle.height - 5 &&
          ball.y - ball.radius < canvas.height - 5 &&
          ball.x > paddle.x && ball.x < paddle.x + paddle.width) {
        ball.dy = -ball.dy;
        // Add some angle based on where ball hits paddle
        const hitPos = (ball.x - paddle.x) / paddle.width;
        ball.dx = 6 * (hitPos - 0.5);
      }
      
      // Bottom collision (lose life)
      if (ball.y + ball.radius > canvas.height) {
        lives--;
        document.getElementById('lives').textContent = lives;
        if (lives <= 0) {
          endGame();
          return;
        }
        resetBall();
      }
      
      // Brick collision
      bricks.forEach(brick => {
        if (brick.visible &&
            ball.x > brick.x && ball.x < brick.x + brick.width &&
            ball.y > brick.y && ball.y < brick.y + brick.height) {
          brick.visible = false;
          ball.dy = -ball.dy;
          score += 10;
          document.getElementById('score').textContent = score;
          
          // Check win
          if (bricks.every(b => !b.visible)) {
            endGame(true);
          }
        }
      });
    }
    
    function resetBall() {
      ball.x = canvas.width / 2;
      ball.y = canvas.height - 50;
      ball.dx = 3 * (Math.random() > 0.5 ? 1 : -1);
      ball.dy = -3;
    }
    
    function draw() {
      ctx.fillStyle = '#0f0f23';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawBricks();
      drawBall();
      drawPaddle();
    }
    
    function gameLoop() {
      update();
      draw();
      animationId = requestAnimationFrame(gameLoop);
    }
    
    function startGame() {
      score = 0;
      lives = 3;
      gameRunning = true;
      paddle.x = (canvas.width - paddle.width) / 2;
      resetBall();
      createBricks();
      document.getElementById('score').textContent = score;
      document.getElementById('lives').textContent = lives;
      document.getElementById('gameOver').classList.remove('show');
      document.getElementById('startBtn').style.display = 'none';
      
      if (animationId) cancelAnimationFrame(animationId);
      gameLoop();
    }
    
    function endGame(won) {
      gameRunning = false;
      cancelAnimationFrame(animationId);
      document.getElementById('msg').textContent = won ? '🎉 恭喜通关!' : '游戏结束';
      document.getElementById('finalScore').textContent = score;
      document.getElementById('gameOver').classList.add('show');
    }
    
    // Controls
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === 'd') rightPressed = true;
      if (e.key === 'ArrowLeft' || e.key === 'a') leftPressed = true;
    });
    document.addEventListener('keyup', (e) => {
      if (e.key === 'ArrowRight' || e.key === 'd') rightPressed = false;
      if (e.key === 'ArrowLeft' || e.key === 'a') leftPressed = false;
    });
    
    // Touch controls
    let touchX = 0;
    canvas.addEventListener('touchstart', (e) => {
      touchX = e.touches[0].clientX;
    });
    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const dx = e.touches[0].clientX - touchX;
      paddle.x += dx * 1.5;
      paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, paddle.x));
      touchX = e.touches[0].clientX;
    });
    
    // Mouse controls
    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      paddle.x = e.clientX - rect.left - paddle.width / 2;
      paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, paddle.x));
    });
    
    createBricks();
    draw();
  </script>
</body>
</html>
