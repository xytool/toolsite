<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>记忆翻牌 - 小游戏乐园</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      color: #fff;
    }
    .back { align-self: flex-start; color: #fff; text-decoration: none; margin-bottom: 10px; }
    h1 { margin-bottom: 10px; }
    .stats { display: flex; gap: 30px; margin-bottom: 20px; font-size: 1.1em; }
    .stats span { background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 20px; }
    .level-select { margin-bottom: 20px; }
    .level-select button {
      padding: 8px 20px;
      margin: 0 5px;
      border: 2px solid rgba(255,255,255,0.5);
      background: transparent;
      color: #fff;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9em;
    }
    .level-select button.active { background: rgba(255,255,255,0.3); border-color: #fff; }
    .game-board {
      display: grid;
      gap: 10px;
      margin-bottom: 20px;
    }
    .card {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2em;
      cursor: pointer;
      transition: transform 0.3s;
      user-select: none;
      position: relative;
    }
    .card:hover { transform: scale(1.05); }
    .card.flipped { background: #fff; }
    .card.matched { background: #4ecca3; animation: matchPulse 0.5s; }
    .card .front, .card .back {
      position: absolute;
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      transition: transform 0.3s;
      border-radius: 12px;
    }
    .card .front {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      transform: rotateY(0deg);
    }
    .card.flipped .front { transform: rotateY(180deg); }
    .card .back {
      background: #fff;
      transform: rotateY(180deg);
      border-radius: 12px;
    }
    .card.flipped .back { transform: rotateY(0deg); }
    @keyframes matchPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    .btn {
      padding: 12px 35px;
      background: #f1c40f;
      color: #333;
      border: none;
      border-radius: 25px;
      font-size: 1em;
      cursor: pointer;
      font-weight: bold;
    }
    .win-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .win-overlay.show { display: flex; }
    .win-overlay h2 { font-size: 2.5em; margin-bottom: 20px; }
    .win-overlay p { font-size: 1.2em; margin-bottom: 20px; }
  </style>
</head>
<body>
  <a href="../index.html" class="back">← 返回首页</a>
  <h1>🃏 记忆翻牌</h1>
  <div class="stats">
    <span>步数: <strong id="moves">0</strong></span>
    <span>时间: <strong id="time">0:00</strong></span>
    <span>最佳: <strong id="best">-</strong></span>
  </div>
  <div class="level-select">
    <button onclick="setLevel(4)" id="btn4">简单 (4x4)</button>
    <button onclick="setLevel(6)" id="btn6" class="active">中等 (6x6)</button>
    <button onclick="setLevel(8)" id="btn8">困难 (8x8)</button>
  </div>
  <div class="game-board" id="board"></div>
  <button class="btn" onclick="initGame()">新游戏</button>
  
  <div class="win-overlay" id="winOverlay">
    <h2>🎉 恭喜通关!</h2>
    <p>用时: <span id="winTime"></span> | 步数: <span id="winMoves"></span></p>
    <button class="btn" onclick="initGame()">再玩一次</button>
  </div>

  <script>
    const emojis = ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🐔','🐧','🐦','🐤','🦆','🦅','🦉','🦇','🐺','🐗','🐴','🦄','🐝','🐛','🦋','🐌','🐞'];
    let cards = [];
    let flipped = [];
    let matched = 0;
    let moves = 0;
    let gridSize = 6;
    let timer = null;
    let seconds = 0;
    let bestScores = JSON.parse(localStorage.getItem('memoryBest') || '{}');
    
    function setLevel(size) {
      gridSize = size;
      document.querySelectorAll('.level-select button').forEach(b => b.classList.remove('active'));
      document.getElementById('btn' + size).classList.add('active');
      initGame();
    }
    
    function initGame() {
      const board = document.getElementById('board');
      board.innerHTML = '';
      board.style.gridTemplateColumns = `repeat(${gridSize}, 80px)`;
      
      cards = [];
      flipped = [];
      matched = 0;
      moves = 0;
      seconds = 0;
      document.getElementById('moves').textContent = moves;
      document.getElementById('time').textContent = '0:00';
      document.getElementById('winOverlay').classList.remove('show');
      
      if (timer) clearInterval(timer);
      timer = setInterval(() => {
        seconds++;
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        document.getElementById('time').textContent = `${m}:${s.toString().padStart(2,'0')}`;
      }, 1000);
      
      // Create pairs
      const pairs = (gridSize * gridSize) / 2;
      const selected = emojis.slice(0, pairs);
      const deck = [...selected, ...selected];
      
      // Shuffle
      for (let i = deck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [deck[i], deck[j]] = [deck[j], deck[i]];
      }
      
      // Create cards
      deck.forEach((emoji, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.index = index;
        card.dataset.emoji = emoji;
        card.innerHTML = `<div class="front">?</div><div class="back">${emoji}</div>`;
        card.addEventListener('click', () => flipCard(card));
        board.appendChild(card);
        cards.push(card);
      });
      
      updateBest();
    }
    
    function flipCard(card) {
      if (card.classList.contains('flipped') || card.classList.contains('matched') || flipped.length >= 2) return;
      
      card.classList.add('flipped');
      flipped.push(card);
      
      if (flipped.length === 2) {
        moves++;
        document.getElementById('moves').textContent = moves;
        
        if (flipped[0].dataset.emoji === flipped[1].dataset.emoji) {
          setTimeout(() => {
            flipped[0].classList.add('matched');
            flipped[1].classList.add('matched');
            flipped = [];
            matched += 2;
            
            if (matched === cards.length) {
              clearInterval(timer);
              const timeStr = document.getElementById('time').textContent;
              document.getElementById('winTime').textContent = timeStr;
              document.getElementById('winMoves').textContent = moves;
              document.getElementById('winOverlay').classList.add('show');
              
              // Save best
              const key = gridSize + 'x' + gridSize;
              if (!bestScores[key] || moves < bestScores[key]) {
                bestScores[key] = moves;
                localStorage.setItem('memoryBest', JSON.stringify(bestScores));
                updateBest();
              }
            }
          }, 500);
        } else {
          setTimeout(() => {
            flipped[0].classList.remove('flipped');
            flipped[1].classList.remove('flipped');
            flipped = [];
          }, 1000);
        }
      }
    }
    
    function updateBest() {
      const key = gridSize + 'x' + gridSize;
      document.getElementById('best').textContent = bestScores[key] || '-';
    }
    
    initGame();
  </script>
</body>
</html>
