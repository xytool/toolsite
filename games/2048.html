<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>2048 - 小游戏乐园</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      background: #faf8ef;
      color: #776e65;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .back { align-self: flex-start; color: #776e65; text-decoration: none; margin-bottom: 10px; }
    h1 { font-size: 2.5em; color: #776e65; margin-bottom: 10px; }
    .header { display: flex; gap: 20px; margin-bottom: 20px; }
    .score-box {
      background: #bbada0;
      padding: 10px 20px;
      border-radius: 6px;
      text-align: center;
      color: white;
    }
    .score-box span { display: block; font-size: 0.8em; text-transform: uppercase; }
    .score-box strong { font-size: 1.5em; }
    
    .game-container {
      background: #bbada0;
      padding: 10px;
      border-radius: 10px;
      position: relative;
    }
    .grid-container {
      display: grid;
      grid-template-columns: repeat(4, 80px);
      grid-template-rows: repeat(4, 80px);
      gap: 10px;
    }
    .grid-cell {
      width: 80px; height: 80px;
      background: rgba(238, 228, 218, 0.35);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8em;
      font-weight: bold;
      transition: all 0.15s ease;
    }
    .tile-2 { background: #eee4da; color: #776e65; }
    .tile-4 { background: #ede0c8; color: #776e65; }
    .tile-8 { background: #f2b179; color: #f9f6f2; }
    .tile-16 { background: #f59563; color: #f9f6f2; }
    .tile-32 { background: #f67c5f; color: #f9f6f2; }
    .tile-64 { background: #f65e3b; color: #f9f6f2; }
    .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 1.5em; }
    .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 1.5em; }
    .tile-512 { background: #edc850; color: #f9f6f2; font-size: 1.5em; }
    .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 1.2em; }
    .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 1.2em; }
    
    .btn { 
      margin-top: 20px;
      padding: 10px 30px;
      background: #8f7a66;
      color: #f9f6f2;
      border: none;
      border-radius: 6px;
      font-size: 1em;
      cursor: pointer;
    }
    
    .game-over-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(238, 228, 218, 0.8);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      border-radius: 10px;
    }
    .game-over-overlay.show { display: flex; }
    .game-over-overlay h2 { font-size: 2em; margin-bottom: 10px; }
  </style>
</head>
<body>
  <a href="../index.html" class="back">← 返回首页</a>
  <h1>2048</h1>
  <div class="header">
    <div class="score-box">
      <span>得分</span>
      <strong id="score">0</strong>
    </div>
    <div class="score-box">
      <span>最高分</span>
      <strong id="best">0</strong>
    </div>
  </div>
  
  <div class="game-container">
    <div class="grid-container" id="grid"></div>
    <div class="game-over-overlay" id="overlay">
      <h2 id="msg">游戏结束</h2>
      <button class="btn" onclick="initGame()">再玩一次</button>
    </div>
  </div>
  
  <button class="btn" onclick="initGame()">新游戏</button>
  <p style="margin-top: 15px; color: #8f7a66;">使用方向键或滑动屏幕移动方块</p>

  <script>
    let board = [];
    let score = 0;
    let best = localStorage.getItem('2048best') || 0;
    document.getElementById('best').textContent = best;
    
    function initGame() {
      board = Array(4).fill(null).map(() => Array(4).fill(0));
      score = 0;
      updateScore();
      document.getElementById('overlay').classList.remove('show');
      addRandomTile();
      addRandomTile();
      render();
    }
    
    function addRandomTile() {
      const empty = [];
      for (let r = 0; r < 4; r++)
        for (let c = 0; c < 4; c++)
          if (board[r][c] === 0) empty.push({r, c});
      if (empty.length === 0) return false;
      const {r, c} = empty[Math.floor(Math.random() * empty.length)];
      board[r][c] = Math.random() < 0.9 ? 2 : 4;
      return true;
    }
    
    function render() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      for (let r = 0; r < 4; r++) {
        for (let c = 0; c < 4; c++) {
          const cell = document.createElement('div');
          cell.className = 'grid-cell';
          if (board[r][c] !== 0) {
            cell.classList.add('tile-' + board[r][c]);
            cell.textContent = board[r][c];
          }
          grid.appendChild(cell);
        }
      }
    }
    
    function updateScore() {
      document.getElementById('score').textContent = score;
      if (score > best) {
        best = score;
        localStorage.setItem('2048best', best);
        document.getElementById('best').textContent = best;
      }
    }
    
    function move(direction) {
      let moved = false;
      const newBoard = board.map(row => [...row]);
      
      function slide(row) {
        let arr = row.filter(v => v !== 0);
        for (let i = 0; i < arr.length - 1; i++) {
          if (arr[i] === arr[i + 1]) {
            arr[i] *= 2;
            score += arr[i];
            arr[i + 1] = 0;
          }
        }
        arr = arr.filter(v => v !== 0);
        while (arr.length < 4) arr.push(0);
        return arr;
      }
      
      if (direction === 'left') {
        for (let r = 0; r < 4; r++) {
          const newRow = slide(board[r]);
          if (newRow.join(',') !== board[r].join(',')) moved = true;
          newBoard[r] = newRow;
        }
      } else if (direction === 'right') {
        for (let r = 0; r < 4; r++) {
          const newRow = slide(board[r].reverse()).reverse();
          if (newRow.join(',') !== board[r].join(',')) moved = true;
          newBoard[r] = newRow;
        }
      } else if (direction === 'up') {
        for (let c = 0; c < 4; c++) {
          const col = [board[0][c], board[1][c], board[2][c], board[3][c]];
          const newCol = slide(col);
          for (let r = 0; r < 4; r++) {
            if (newBoard[r][c] !== newCol[r]) moved = true;
            newBoard[r][c] = newCol[r];
          }
        }
      } else if (direction === 'down') {
        for (let c = 0; c < 4; c++) {
          const col = [board[0][c], board[1][c], board[2][c], board[3][c]];
          const newCol = slide(col.reverse()).reverse();
          for (let r = 0; r < 4; r++) {
            if (newBoard[r][c] !== newCol[r]) moved = true;
            newBoard[r][c] = newCol[r];
          }
        }
      }
      
      if (moved) {
        board = newBoard;
        updateScore();
        addRandomTile();
        render();
        if (isGameOver()) {
          document.getElementById('msg').textContent = '游戏结束';
          document.getElementById('overlay').classList.add('show');
        }
        if (hasWon()) {
          document.getElementById('msg').textContent = '恭喜你赢了！';
          document.getElementById('overlay').classList.add('show');
        }
      }
    }
    
    function isGameOver() {
      for (let r = 0; r < 4; r++)
        for (let c = 0; c < 4; c++)
          if (board[r][c] === 0) return false;
      for (let r = 0; r < 4; r++)
        for (let c = 0; c < 4; c++)
          if ((c < 3 && board[r][c] === board[r][c+1]) || (r < 3 && board[r][c] === board[r+1][c])) return false;
      return true;
    }
    
    function hasWon() {
      return board.some(row => row.some(v => v === 2048));
    }
    
    document.addEventListener('keydown', (e) => {
      switch(e.key) {
        case 'ArrowLeft': move('left'); e.preventDefault(); break;
        case 'ArrowRight': move('right'); e.preventDefault(); break;
        case 'ArrowUp': move('up'); e.preventDefault(); break;
        case 'ArrowDown': move('down'); e.preventDefault(); break;
      }
    });
    
    // Touch support
    let sx, sy;
    document.addEventListener('touchstart', e => { sx = e.touches[0].clientX; sy = e.touches[0].clientY; });
    document.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - sx;
      const dy = e.changedTouches[0].clientY - sy;
      if (Math.max(Math.abs(dx), Math.abs(dy)) < 30) return;
      if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
      else move(dy > 0 ? 'down' : 'up');
    });
    
    initGame();
  </script>
</body>
</html>
