<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Flappy Bird - 小游戏乐园</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .back { position: absolute; top: 15px; left: 15px; color: #fff; text-decoration: none; z-index: 10; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
    #gameCanvas { display: block; }
    .score-display {
      position: absolute;
      top: 50px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 3em;
      color: #fff;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      font-weight: bold;
      z-index: 5;
    }
    .game-over {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.95);
      padding: 30px 50px;
      border-radius: 16px;
      text-align: center;
      display: none;
      z-index: 10;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .game-over.show { display: block; }
    .game-over h2 { color: #e74c3c; margin-bottom: 10px; }
    .game-over p { color: #666; margin-bottom: 20px; font-size: 1.1em; }
    .btn {
      padding: 12px 35px;
      background: #f1c40f;
      color: #333;
      border: none;
      border-radius: 25px;
      font-size: 1.1em;
      cursor: pointer;
      font-weight: bold;
    }
    .btn:active { background: #f39c12; }
    .hint {
      position: absolute;
      bottom: 20px;
      color: rgba(255,255,255,0.8);
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <a href="../index.html" class="back">← 返回首页</a>
  <div class="score-display" id="score">0</div>
  <canvas id="gameCanvas"></canvas>
  
  <div class="game-over" id="gameOver">
    <h2>游戏结束</h2>
    <p>得分: <span id="finalScore">0</span><br>最高分: <span id="bestScore">0</span></p>
    <button class="btn" onclick="startGame()">再玩一次</button>
  </div>
  
  <div class="hint">点击屏幕或按空格键飞行</div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = Math.min(window.innerWidth, 400);
    canvas.height = Math.min(window.innerHeight, 600);
    
    let bird = { x: 80, y: 200, velocity: 0, radius: 15 };
    let pipes = [];
    let score = 0;
    let best = localStorage.getItem('flappyBest') || 0;
    let gameRunning = false;
    let animationId;
    const gravity = 0.5;
    const jump = -8;
    const pipeWidth = 60;
    const pipeGap = 150;
    
    function drawBird() {
      ctx.fillStyle = '#f1c40f';
      ctx.beginPath();
      ctx.arc(bird.x, bird.y, bird.radius, 0, Math.PI * 2);
      ctx.fill();
      // Eye
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(bird.x + 6, bird.y - 4, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#333';
      ctx.beginPath();
      ctx.arc(bird.x + 8, bird.y - 4, 2, 0, Math.PI * 2);
      ctx.fill();
      // Beak
      ctx.fillStyle = '#e67e22';
      ctx.beginPath();
      ctx.moveTo(bird.x + 10, bird.y);
      ctx.lineTo(bird.x + 20, bird.y + 3);
      ctx.lineTo(bird.x + 10, bird.y + 6);
      ctx.fill();
    }
    
    function drawPipes() {
      ctx.fillStyle = '#27ae60';
      pipes.forEach(pipe => {
        // Top pipe
        ctx.fillRect(pipe.x, 0, pipeWidth, pipe.top);
        ctx.fillStyle = '#2ecc71';
        ctx.fillRect(pipe.x + 3, 0, pipeWidth - 6, pipe.top - 5);
        ctx.fillStyle = '#27ae60';
        ctx.fillRect(pipe.x - 2, pipe.top - 20, pipeWidth + 4, 20);
        
        // Bottom pipe
        ctx.fillRect(pipe.x, canvas.height - pipe.bottom, pipeWidth, pipe.bottom);
        ctx.fillStyle = '#2ecc71';
        ctx.fillRect(pipe.x + 3, canvas.height - pipe.bottom + 5, pipeWidth - 6, pipe.bottom - 5);
        ctx.fillStyle = '#27ae60';
        ctx.fillRect(pipe.x - 2, canvas.height - pipe.bottom, pipeWidth + 4, 20);
      });
    }
    
    function drawBackground() {
      // Sky gradient already in CSS
      // Clouds
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.beginPath();
      ctx.arc(80, 80, 30, 0, Math.PI * 2);
      ctx.arc(110, 70, 40, 0, Math.PI * 2);
      ctx.arc(140, 80, 30, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.beginPath();
      ctx.arc(280, 120, 25, 0, Math.PI * 2);
      ctx.arc(305, 112, 32, 0, Math.PI * 2);
      ctx.arc(330, 120, 25, 0, Math.PI * 2);
      ctx.fill();
      
      // Ground
      ctx.fillStyle = '#deb887';
      ctx.fillRect(0, canvas.height - 40, canvas.width, 40);
      ctx.fillStyle = '#7cb342';
      ctx.fillRect(0, canvas.height - 45, canvas.width, 5);
    }
    
    function update() {
      if (!gameRunning) return;
      
      bird.velocity += gravity;
      bird.y += bird.velocity;
      
      // Ground collision
      if (bird.y + bird.radius > canvas.height - 45) {
        endGame();
        return;
      }
      
      // Ceiling collision
      if (bird.y - bird.radius < 0) {
        bird.y = bird.radius;
        bird.velocity = 0;
      }
      
      // Update pipes
      pipes.forEach(pipe => {
        pipe.x -= 2;
        
        // Score
        if (!pipe.passed && pipe.x + pipeWidth < bird.x) {
          score++;
          pipe.passed = true;
          document.getElementById('score').textContent = score;
        }
        
        // Collision
        if (bird.x + bird.radius > pipe.x && bird.x - bird.radius < pipe.x + pipeWidth) {
          if (bird.y - bird.radius < pipe.top || bird.y + bird.radius > canvas.height - pipe.bottom - 45) {
            endGame();
          }
        }
      });
      
      // Remove off-screen pipes
      pipes = pipes.filter(pipe => pipe.x > -pipeWidth);
      
      // Add new pipe
      if (pipes.length === 0 || pipes[pipes.length - 1].x < canvas.width - 200) {
        const minHeight = 50;
        const maxHeight = canvas.height - pipeGap - minHeight - 45;
        const topHeight = Math.floor(Math.random() * (maxHeight - minHeight) + minHeight);
        pipes.push({
          x: canvas.width,
          top: topHeight,
          bottom: canvas.height - topHeight - pipeGap - 45,
          passed: false
        });
      }
    }
    
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBackground();
      drawPipes();
      drawBird();
    }
    
    function gameLoop() {
      update();
      draw();
      animationId = requestAnimationFrame(gameLoop);
    }
    
    function jumpBird() {
      if (gameRunning) {
        bird.velocity = jump;
      }
    }
    
    function startGame() {
      bird = { x: 80, y: 200, velocity: 0, radius: 15 };
      pipes = [];
      score = 0;
      gameRunning = true;
      document.getElementById('score').textContent = score;
      document.getElementById('gameOver').classList.remove('show');
      
      if (animationId) cancelAnimationFrame(animationId);
      gameLoop();
    }
    
    function endGame() {
      gameRunning = false;
      cancelAnimationFrame(animationId);
      if (score > best) {
        best = score;
        localStorage.setItem('flappyBest', best);
      }
      document.getElementById('finalScore').textContent = score;
      document.getElementById('bestScore').textContent = best;
      document.getElementById('gameOver').classList.add('show');
    }
    
    // Controls
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        if (!gameRunning && document.getElementById('gameOver').classList.contains('show')) {
          startGame();
        } else {
          jumpBird();
        }
      }
    });
    
    canvas.addEventListener('click', () => {
      if (!gameRunning && document.getElementById('gameOver').classList.contains('show')) {
        startGame();
      } else {
        jumpBird();
      }
    });
    
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (!gameRunning && document.getElementById('gameOver').classList.contains('show')) {
        startGame();
      } else {
        jumpBird();
      }
    });
    
    // Start
    drawBackground();
    drawBird();
    
    // Auto-start on first interaction
    let started = false;
    function autoStart() {
      if (!started) {
        started = true;
        startGame();
      }
    }
    document.addEventListener('keydown', autoStart, {once: true});
    canvas.addEventListener('click', autoStart, {once: true});
    canvas.addEventListener('touchstart', autoStart, {once: true});
  </script>
</body>
</html>
